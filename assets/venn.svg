<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg3)" rx="12"/>

  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="700" fill="white">The Novelty: Intersection of Three Properties</text>

  <!-- Venn-like diagram with three circles -->
  <!-- Shared Dynamics -->
  <circle cx="300" cy="200" r="120" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.4)" stroke-width="2"/>
  <text x="300" y="110" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#00d4ff">Shared</text>
  <text x="300" y="128" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#00d4ff">Dynamics</text>

  <!-- Embodiment-Invariant -->
  <circle cx="500" cy="200" r="120" fill="rgba(123,47,247,0.08)" stroke="rgba(123,47,247,0.4)" stroke-width="2"/>
  <text x="500" y="110" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#bc8cff">Embodiment-</text>
  <text x="500" y="128" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#bc8cff">Invariant</text>

  <!-- Cross-Morphology -->
  <circle cx="400" cy="310" r="120" fill="rgba(63,185,80,0.08)" stroke="rgba(63,185,80,0.4)" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#3fb950">Cross-</text>
  <text x="400" y="403" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#3fb950">Morphology</text>

  <!-- Intersection label -->
  <rect x="350" y="200" width="100" height="50" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="400" y="220" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="white">CP-</text>
  <text x="400" y="238" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="white">Dynamics</text>

  <!-- Existing work labels -->
  <text x="200" y="200" text-anchor="middle" font-family="system-ui" font-size="10" fill="#8b949e">He et al.</text>
  <text x="200" y="215" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6e7681">(hands only)</text>

  <text x="600" y="200" text-anchor="middle" font-family="system-ui" font-size="10" fill="#8b949e">UniAct / OPFA</text>
  <text x="600" y="215" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6e7681">(no dynamics)</text>

  <text x="400" y="340" text-anchor="middle" font-family="system-ui" font-size="10" fill="#8b949e">RT-X</text>
  <text x="400" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6e7681">(no shared dynamics)</text>

  <!-- Legend -->
  <rect x="700" y="100" width="170" height="140" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="785" y="120" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="white">Legend</text>

  <circle cx="720" cy="145" r="5" fill="#00d4ff"/>
  <text x="735" y="149" font-family="system-ui" font-size="10" fill="#8b949e">Dynamics model (predicts state→state)</text>

  <circle cx="720" cy="170" r="5" fill="#bc8cff"/>
  <text x="735" y="174" font-family="system-ui" font-size="10" fill="#8b949e">Same model for any robot</text>

  <circle cx="720" cy="195" r="5" fill="#3fb950"/>
  <text x="735" y="199" font-family="system-ui" font-size="10" fill="#8b949e">Works across arms, hands, mobile</text>

  <rect x="712" y="215" width="10" height="10" rx="2" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="735" y="224" font-family="system-ui" font-size="10" fill="#8b949e">CP-Dynamics (ours)</text>

  <!-- Bottom -->
  <text x="450" y="395" text-anchor="middle" font-family="system-ui" font-size="10" fill="#484f58">Nobody has demonstrated all three simultaneously.</text>
</svg>
